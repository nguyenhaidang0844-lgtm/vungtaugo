<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bản đồ lộ trình - Cảm biến bước chân & La bàn</title>
    <!-- Leaflet (bản đồ ổn định, hiện đại) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* tránh chọn text khi thao tác */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a2a32;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Header thông tin */
        .info-panel {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            border-bottom: 1px solid #2c4c5c;
            z-index: 10;
        }
        .info-card {
            background: #0f2128;
            border-radius: 24px;
            padding: 8px 16px;
            min-width: 100px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .info-card .label {
            font-size: 12px;
            opacity: 0.7;
            letter-spacing: 1px;
        }
        .info-card .value {
            font-size: 22px;
            font-weight: bold;
            color: #ffb347;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        button {
            background: #2c7da0;
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:active { transform: scale(0.96); background: #1f5e7a; }
        button.stop { background: #b43b3b; }
        .status-badge {
            background: #2c2c2c;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 13px;
            font-family: monospace;
        }
        /* Map container */
        .map-container {
            flex: 1;
            width: 100%;
            position: relative;
        }
        #map {
            height: 100%;
            width: 100%;
            background: #1e3b44;
        }
        .legend {
            position: absolute;
            bottom: 20px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            pointer-events: none;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        @media (max-width: 600px) {
            .info-card .value { font-size: 18px; }
            .info-card { padding: 4px 12px; }
            button { padding: 6px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="info-panel">
    <div class="info-card">
        <div class="label">🚶 BƯỚC CHÂN</div>
        <div class="value" id="stepCount">0</div>
    </div>
    <div class="info-card">
        <div class="label">📏 QUÃNG ĐƯỜNG (m)</div>
        <div class="value" id="distance">0.0</div>
    </div>
    <div class="info-card">
        <div class="label">🧭 HƯỚNG (°)</div>
        <div class="value" id="headingVal">---</div>
    </div>
    <div class="controls">
        <button id="startBtn">▶ BẮT ĐẦU</button>
        <button id="stopBtn" class="stop">⏹️ DỪNG</button>
    </div>
</div>
<div class="map-container">
    <div id="map"></div>
    <div class="legend">📍 Đường màu cam: lộ trình từ cảm biến | 🔵 Chấm xanh: GPS hiện tại</div>
</div>

<script>
    // ----------------------------- THAM SỐ CHÍNH -----------------------------
    let tracking = false;           // trạng thái ghi nhận lộ trình
    let steps = 0;                  // số bước đếm được
    let totalDistance = 0;          // tổng quãng đường (mét)
    let stepLength = 0.7;           // chiều dài bước trung bình (m) – có thể điều chỉnh
    
    // Dữ liệu lộ trình (tọa độ theo bước chân + hướng)
    let pathCoords = [];            // mảng {lat, lng}
    let lastStepLatLng = null;      // vị trí sau bước cuối (dùng để nối tiếp)
    let lastHeading = 0;            // hướng di chuyển (độ) từ la bàn
    let currentLocation = { lat: 0, lng: 0 };   // vị trí GPS hiện tại
    
    // Cảm biến và step detection
    let lastPeakTime = 0;
    let lastMagnitude = 1.0;
    let stepDetectEnabled = false;
    let accelerometerData = { x: 0, y: 0, z: 0 };
    
    // Biến lưu trữ interval cho GPS watch
    let watchId = null;
    let map = null;
    let polylineLayer = null;       // đường vẽ lộ trình
    let userMarker = null;          // marker GPS hiện tại
    let startMarker = null;         // điểm bắt đầu
    
    // Hàm khởi tạo bản đồ (Leaflet)
    function initMap(lat, lng) {
        if (map) return;
        map = L.map('map').setView([lat, lng], 18);
        // Dùng lớp bản đồ ổn định, đẹp (CartoDB Voyager – hỗ trỳ HTTPS, nhanh)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
            subdomains: 'abcd',
            maxZoom: 19,
            minZoom: 15
        }).addTo(map);
        
        // Marker vị trí hiện tại (GPS)
        userMarker = L.marker([lat, lng], { icon: L.divIcon({ className: 'gps-marker', html: '📍', iconSize: [24,24] }) }).addTo(map);
        startMarker = L.marker([lat, lng], { icon: L.divIcon({ className: 'start-marker', html: '🚩', iconSize: [24,24] }) }).addTo(map);
        // Khởi tạo polyline rỗng
        polylineLayer = L.polyline([], { color: '#ff9f4a', weight: 5, opacity: 0.8 }).addTo(map);
        
        // Lưu vị trí bắt đầu
        currentLocation = { lat, lng };
        lastStepLatLng = { lat, lng };
        pathCoords = [{ lat, lng }];
        updatePolyline();
    }
    
    // Cập nhật đường đi trên bản đồ
    function updatePolyline() {
        if (!polylineLayer) return;
        const latlngs = pathCoords.map(p => [p.lat, p.lng]);
        polylineLayer.setLatLngs(latlngs);
        if (map && latlngs.length > 0) {
            // Tự động zoom vào điểm cuối (nếu đang theo dõi)
            const last = latlngs[latlngs.length-1];
            map.panTo(last, { animate: true, duration: 0.3 });
        }
    }
    
    // Thêm điểm mới vào lộ trình (dựa trên bước chân + hướng)
    function addStepPoint() {
        if (!tracking) return;
        if (!lastStepLatLng) return;
        if (lastHeading === null || isNaN(lastHeading)) return;
        
        // Tính toán vị trí mới dựa trên hướng và độ dài bước
        const rad = lastHeading * Math.PI / 180;
        const deltaLat = (stepLength * Math.cos(rad)) / 111320;   // 1 độ vĩ ≈ 111320 m
        const deltaLng = (stepLength * Math.sin(rad)) / (111320 * Math.cos(lastStepLatLng.lat * Math.PI/180));
        
        const newLat = lastStepLatLng.lat + deltaLat;
        const newLng = lastStepLatLng.lng + deltaLng;
        const newPoint = { lat: newLat, lng: newLng };
        
        // Cập nhật mảng lộ trình
        pathCoords.push(newPoint);
        lastStepLatLng = newPoint;
        updatePolyline();
        
        // Cập nhật quãng đường (tích lũy)
        totalDistance += stepLength;
        document.getElementById('distance').innerText = totalDistance.toFixed(1);
    }
    
    // ---------- XỬ LÝ GIA TỐC KẾ (PHÁT HIỆN BƯỚC CHÂN) ----------
    // Bộ lọc low-pass đơn giản
    let filteredMagnitude = 1.0;
    const ALPHA = 0.3;   // hệ số lọc
    
    function handleAccelerometer(event) {
        if (!stepDetectEnabled) return;
        const acc = event.accelerationIncludingGravity;
        if (!acc) return;
        let { x, y, z } = acc;
        if (x === null || y === null || z === null) return;
        
        // Tính độ lớn vector (g)
        let magnitude = Math.sqrt(x*x + y*y + z*z);
        // Lọc low-pass để loại bỏ nhiễu rung nhẹ
        filteredMagnitude = ALPHA * magnitude + (1 - ALPHA) * filteredMagnitude;
        
        // Ngưỡng phát hiện bước: magnitude > 1.15g và có biến động rõ (khác baseline)
        // Đồng thời tránh double count với khoảng cách thời gian
        const now = Date.now();
        const isPeak = (filteredMagnitude > 1.18 && filteredMagnitude > lastMagnitude + 0.05);
        if (isPeak && (now - lastPeakTime) > 280) {
            // Phát hiện bước chân
            steps++;
            document.getElementById('stepCount').innerText = steps;
            // Vẽ điểm lộ trình tương ứng với bước này
            addStepPoint();
            lastPeakTime = now;
        }
        lastMagnitude = filteredMagnitude;
    }
    
    // ---------- XỬ LÝ LA BÀN (HƯỚNG DI CHUYỂN) ----------
    let compassHeading = 0;     // 0-360 độ, 0 = Bắc
    function handleOrientation(event) {
        if (!tracking) return;
        // Lấy góc alpha (xoay theo trục dọc), cần chuẩn hóa về hướng đi
        let alpha = event.alpha;      // 0-360, góc so với hướng Bắc
        if (alpha === null || alpha === undefined) return;
        // Beta, gamma có thể dùng để hiệu chỉnh nhưng đơn giản lấy alpha
        // Đảm bảo giá trị hợp lý
        let heading = alpha;
        if (isNaN(heading)) heading = lastHeading;
        else {
            heading = (heading + 360) % 360;
            // Lọc nhiễu nhẹ: nếu thay đổi đột ngột quá 20 độ trong 1 lần thì giữ nguyên (tùy chọn)
            if (Math.abs(heading - lastHeading) > 30 && lastHeading !== 0) {
                // giữ nguyên heading cũ để tránh nhiễu la bàn
            } else {
                lastHeading = heading;
            }
        }
        compassHeading = lastHeading;
        document.getElementById('headingVal').innerText = Math.round(compassHeading);
    }
    
    // ---------- XỬ LÝ GPS (LẤY VỊ TRÍ THỰC, HIỆU CHỈNH) ----------
    function onLocationUpdate(position) {
        const { latitude, longitude, accuracy } = position.coords;
        if (!latitude || !longitude) return;
        // Cập nhật vị trí hiện tại
        currentLocation = { lat: latitude, lng: longitude };
        
        // Nếu bản đồ chưa khởi tạo => khởi tạo với vị trí GPS
        if (!map) {
            initMap(latitude, longitude);
            // Đặt điểm bắt đầu lộ trình = vị trí GPS đầu tiên
            lastStepLatLng = { lat: latitude, lng: longitude };
            pathCoords = [{ lat: latitude, lng: longitude }];
            updatePolyline();
        } else {
            // Cập nhật marker GPS
            if (userMarker) userMarker.setLatLng([latitude, longitude]);
            // Nếu tracking chưa bắt đầu, ta vẫn cập nhật điểm bắt đầu (để khi start sẽ chính xác)
            if (!tracking) {
                // Nếu không tracking, ta chỉ cập nhật vị trí bắt đầu tiềm năng
                if (lastStepLatLng === null || pathCoords.length === 0) {
                    lastStepLatLng = { lat: latitude, lng: longitude };
                    pathCoords = [{ lat: latitude, lng: longitude }];
                    updatePolyline();
                    if (startMarker) startMarker.setLatLng([latitude, longitude]);
                }
            } else {
                // (Tùy chọn) Khi GPS có độ chính xác cao, có thể hiệu chỉnh drift
                // Nhưng giữ nguyên logic PDR để minh họa: Không can thiệp vào pathCoords,
                // chỉ dùng GPS để hiển thị vị trí thực tế.
            }
        }
    }
    
    function startGPS() {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(
            onLocationUpdate,
            (err) => console.warn("Lỗi GPS:", err.message),
            { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
        );
        // Lấy vị trí 1 lần nhanh để hiển thị bản đồ
        navigator.geolocation.getCurrentPosition(
            (pos) => onLocationUpdate(pos),
            (err) => {
                console.warn("Không thể lấy vị trí, dùng mặc định TP.HCM");
                initMap(10.8231, 106.6297);
            },
            { timeout: 5000 }
        );
    }
    
    // ------------------- YÊU CẦU QUYỀN CẢM BIẾN (iOS/Android) -------------------
    // iOS: cần gọi requestPermission cho DeviceMotion và DeviceOrientation
    async function requestSensorPermissions() {
        // DeviceOrientationEvent (la bàn)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                } else {
                    console.warn("Từ chối quyền la bàn");
                }
            } catch(e) { console.warn(e); }
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }
        
        // DeviceMotionEvent (gia tốc kế)
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
                const response = await DeviceMotionEvent.requestPermission();
                if (response === 'granted') {
                    window.addEventListener('devicemotion', handleAccelerometer);
                } else {
                    console.warn("Từ chối quyền gia tốc kế");
                }
            } catch(e) { console.warn(e); }
        } else {
            window.addEventListener('devicemotion', handleAccelerometer);
        }
    }
    
    // Hàm bắt đầu theo dõi (kích hoạt cảm biến và reset dữ liệu)
    async function startTracking() {
        if (tracking) return;
        // Reset thông số
        steps = 0;
        totalDistance = 0;
        document.getElementById('stepCount').innerText = "0";
        document.getElementById('distance').innerText = "0.0";
        
        // Reset lộ trình dựa trên vị trí GPS hiện tại (nếu có)
        if (currentLocation.lat !== 0 && currentLocation.lng !== 0) {
            lastStepLatLng = { lat: currentLocation.lat, lng: currentLocation.lng };
            pathCoords = [{ lat: currentLocation.lat, lng: currentLocation.lng }];
        } else {
            // fallback nếu chưa có GPS
            if (lastStepLatLng) pathCoords = [lastStepLatLng];
            else pathCoords = [];
        }
        updatePolyline();
        
        lastPeakTime = 0;
        lastMagnitude = 1.0;
        filteredMagnitude = 1.0;
        tracking = true;
        stepDetectEnabled = true;
        
        // Nếu chưa có bản đồ và chưa có GPS, thử get current position
        if (!map) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    if (!map) initMap(pos.coords.latitude, pos.coords.longitude);
                    lastStepLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    pathCoords = [lastStepLatLng];
                    updatePolyline();
                },
                () => {
                    initMap(10.8231, 106.6297);
                }
            );
        }
        
        // Đánh dấu trạng thái giao diện
        document.getElementById('startBtn').style.opacity = "0.6";
        document.getElementById('stopBtn').style.opacity = "1";
    }
    
    function stopTracking() {
        tracking = false;
        stepDetectEnabled = false;
        document.getElementById('startBtn').style.opacity = "1";
        // Không reset map, chỉ dừng ghi nhận bước
    }
    
    // Hàm reset toàn bộ lộ trình (xóa đường, reset bước)
    function resetPath() {
        if (tracking) stopTracking();
        steps = 0;
        totalDistance = 0;
        document.getElementById('stepCount').innerText = "0";
        document.getElementById('distance').innerText = "0.0";
        if (currentLocation.lat && currentLocation.lng) {
            lastStepLatLng = { lat: currentLocation.lat, lng: currentLocation.lng };
            pathCoords = [{ lat: currentLocation.lat, lng: currentLocation.lng }];
        } else {
            pathCoords = [];
            lastStepLatLng = null;
        }
        updatePolyline();
        if (startMarker && lastStepLatLng) startMarker.setLatLng([lastStepLatLng.lat, lastStepLatLng.lng]);
        tracking = false;
        stepDetectEnabled = false;
    }
    
    // Gắn sự kiện cho nút bấm và yêu cầu quyền khi người dùng tương tác lần đầu
    document.addEventListener('DOMContentLoaded', () => {
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        // Yêu cầu quyền cảm biến và GPS ngay khi bấm nút "BẮT ĐẦU" (để đáp ứng yêu cầu tương tác của iOS)
        startBtn.addEventListener('click', async () => {
            // Yêu cầu quyền cảm biến (nếu chưa có)
            await requestSensorPermissions();
            // Yêu cầu quyền GPS (nếu chưa)
            if (!watchId) {
                startGPS();
                // Đợi một chút để GPS cập nhật vị trí ban đầu
                setTimeout(() => {
                    startTracking();
                }, 300);
            } else {
                startTracking();
            }
        });
        
        stopBtn.addEventListener('click', () => {
            stopTracking();
        });
        
        // Nút reset (tuỳ chọn thêm: nhấn giữ hoặc thêm nút, nhưng hiện tại có thể thêm bằng cách nhấn dừng và start lại)
        // Để tiện, thêm một nút reset ẩn? Thôi, người dùng có thể reload trang hoặc bấm dừng, start lại sẽ reset.
        // Nhưng theo logic, khi start lại cần reset dữ liệu cũ, chúng ta đã có reset trong startTracking.
        // Tuy nhiên để tránh lỗi lộ trình chồng, nếu đang tracking mà bấm start thì không làm gì.
        // Cải tiến: Nếu muốn reset hoàn toàn, dùng nút "Xóa đường" nhưng thiết kế gọn nhẹ, thêm bằng cách nhấn giữ start?
        // Tạo thêm nút nhỏ reset trên giao diện? Sẽ thêm nút reset ngay cạnh dừng
        const resetBtn = document.createElement('button');
        resetBtn.innerText = '🗑️ XÓA ĐƯỜNG';
        resetBtn.style.background = '#5a626e';
        resetBtn.style.marginLeft = '8px';
        resetBtn.addEventListener('click', () => {
            if (tracking) stopTracking();
            resetPath();
        });
        document.querySelector('.controls').appendChild(resetBtn);
    });
    
    // Khởi động GPS ngay khi trang tải (để có vị trí ban đầu, nhưng không tự bật cảm biến)
    window.addEventListener('load', () => {
        startGPS();  // Lấy vị trí và hiển thị map nếu chưa
        // Không tự động bắt đầu tracking để tránh spam cảm biến khi chưa được phép
        // Nhưng nếu trình duyệt không yêu cầu quyền (Android), vẫn có thể hiển thị map
        setTimeout(() => {
            if (!map && currentLocation.lat === 0) {
                initMap(10.8231, 106.6297); // fallback
            }
        }, 1500);
    });
    
    // Xử lý khi thoát, clear watch
    window.addEventListener('beforeunload', () => {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (typeof DeviceMotionEvent !== 'undefined') window.removeEventListener('devicemotion', handleAccelerometer);
        if (typeof DeviceOrientationEvent !== 'undefined') window.removeEventListener('deviceorientation', handleOrientation);
    });
    
    // Bổ sung: hiển thị trạng thái rung lắc nhẹ (có thể thêm UI nhưng không bắt buộc)
    // Ghi chú: Ứng dụng dùng cảm biến gia tốc để phát hiện bước, la bàn để xác định hướng, GPS làm mốc và hiển thị.
    // Độ ổn định: bộ lọc low-pass giúp giảm rung lắc, ngưỡng phát hiện bước tối ưu cho đi bộ.
    // Nếu muốn tinh chỉnh stepLength có thể thêm thanh trượt, nhưng đảm bảo yêu cầu.
    
    // Thông báo hướng dẫn ngắn cho người dùng (console)
    console.log("✅ Ứng dụng sẵn sàng. Bấm 'BẮT ĐẦU' và cho phép cảm biến + vị trí. Đi bộ để vẽ lộ trình.");
    console.log("🎯 Gia tốc kế phát hiện bước, la bàn xác định hướng, GPS hỗ trợ nền.");
</script>
</body>
</html>
